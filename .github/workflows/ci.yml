name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  project-check:
    name: Project structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify repository layout
        run: |
          test -f CMakeLists.txt
          test -f README.md
          test -f README.zh-CN.md
          test -d src
          test -d plugins
          test -d resources
          echo "Project structure OK"

      - name: Validate CMakeLists.txt
        run: |
          grep -q 'project(SmartVisionWorkbench' CMakeLists.txt
          grep -q 'find_package(Qt6' CMakeLists.txt
          grep -q 'find_package(OpenCV' CMakeLists.txt
          echo "CMakeLists.txt looks valid"

      - name: Note on Linux build
        run: |
          echo "Full Linux build is not CI-tested (OpenCV contrib wechat_qrcode required for QR plugin)."
          echo "Primary supported platform: Windows + Qt 6.8 + OpenCV 4 with opencv_contrib."
